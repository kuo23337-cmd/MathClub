<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamma Math Club — Gammath.xyz</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    // Inline script to prevent theme flickering on page load
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <style>
    :root {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --text-main: #0f172a;
      --text-muted: #475569;
      --accent-blue: #1e40af;
      --accent-blue-hover: #1d4ed8;
      --accent-light: #eff6ff;
      --border-color: #e2e8f0;
      --border-focus: #3b82f6;
      --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
      --card-radius: 8px;
    }

    /* Dark Mode Theme Variables */
    [data-theme="dark"] {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-blue: #3b82f6;
      --accent-blue-hover: #60a5fa;
      --accent-light: #1e293b;
      --border-color: #334155;
      --border-focus: #60a5fa;
      --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -2px rgba(0, 0, 0, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-main);
      line-height: 1.5;
      padding: 20px;
      transition: background-color 0.2s, color 0.2s;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 30px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent-blue);
      text-decoration: none;
    }

    .nav-controls {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    select, input, button, textarea {
      font-family: inherit;
      font-size: 0.95rem;
    }

    select {
      padding: 6px 12px;
      border-radius: var(--card-radius);
      border: 1px solid var(--border-color);
      background-color: var(--bg-secondary);
      color: var(--text-main);
      cursor: pointer;
      outline: none;
    }

    .btn {
      background-color: var(--accent-blue);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: var(--card-radius);
      cursor: pointer;
      font-weight: 500;
      transition: background-color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover {
      background-color: var(--accent-blue-hover);
    }

    .btn.secondary {
      background-color: #ef4444;
    }
    .btn.secondary:hover {
      background-color: #dc2626;
    }

    .btn.outline {
      background-color: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
    }
    .btn.outline:hover {
      background-color: var(--bg-primary);
      color: var(--text-main);
    }

    .theme-toggle-btn {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 6px 12px;
      border-radius: var(--card-radius);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: background-color 0.2s, border-color 0.2s;
    }
    .theme-toggle-btn:hover {
      background-color: var(--accent-light);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 768px) {
      .grid {
        grid-template-columns: 2fr 1fr;
      }
    }

    .card {
      background-color: var(--bg-secondary);
      border-radius: var(--card-radius);
      border: 1px solid var(--border-color);
      box-shadow: var(--card-shadow);
      padding: 24px;
      margin-bottom: 24px;
      transition: background-color 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .card h2 {
      margin-bottom: 16px;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .auth-view {
      max-width: 400px;
      margin: 60px auto;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .form-control {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--card-radius);
      border: 1px solid var(--border-color);
      background-color: var(--bg-secondary);
      color: var(--text-main);
      transition: border-color 0.2s, background-color 0.2s, color 0.2s;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--border-focus);
    }

    .auth-toggle {
      text-align: center;
      margin-top: 16px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .auth-toggle span {
      color: var(--accent-blue);
      cursor: pointer;
      text-decoration: underline;
    }

    .seminar-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .seminar-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .seminar-info h3 {
      font-size: 1.05rem;
      margin-bottom: 4px;
    }

    .seminar-info p {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .player-box {
      background: #000;
      border-radius: var(--card-radius);
      height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #747d8c;
      position: relative;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .player-icon {
      font-size: 3rem;
      cursor: pointer;
      color: #f1f2f6;
      z-index: 2;
      transition: transform 0.1s;
    }

    .player-icon:hover {
      transform: scale(1.1);
    }

    .player-status {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #a4b0be;
      z-index: 2;
    }

    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background-color: #2f3542;
      z-index: 2;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background-color: var(--border-focus);
      transition: width 0.1s linear;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      height: 350px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background-color: var(--bg-primary);
      border-radius: var(--card-radius);
      border: 1px solid var(--border-color);
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: background-color 0.2s, border-color 0.2s;
    }

    .chat-msg {
      font-size: 0.9rem;
      word-break: break-all;
    }

    .chat-msg .user {
      font-weight: bold;
      color: var(--accent-blue);
      margin-right: 6px;
    }

    .chat-msg .time {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-left: 6px;
    }

    .chat-input-box {
      display: flex;
      gap: 8px;
    }

    .chat-input-box textarea {
      flex: 1;
      resize: none;
      padding: 8px;
      border-radius: var(--card-radius);
      border: 1px solid var(--border-color);
      background-color: var(--bg-secondary);
      color: var(--text-main);
      height: 40px;
      transition: background-color 0.2s, border-color 0.2s, color 0.2s;
    }

    .chat-input-box textarea:focus {
      outline: none;
      border-color: var(--border-focus);
    }

    .hidden { display: none !important; }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
    }

    .google-btn-wrapper {
      display: flex;
      justify-content: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--border-color);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="#" class="logo">Gamma Math Club</a>
      <div class="nav-controls">
        <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle Theme">🌙</button>
        <select id="langSelect">
          <option value="en">English</option>
          <option value="zh">简体中文</option>
        </select>
        <div id="userProfile" class="user-profile hidden">
          <span id="userInfo"></span>
          <button id="logoutBtn" class="btn outline">Logout</button>
        </div>
      </div>
    </header>

    <div id="authView" class="card auth-view hidden">
      <h2 id="authTitle">Login</h2>
      <div class="form-group">
        <label id="lblUsername" for="usernameInp">Username</label>
        <input type="text" id="usernameInp" class="form-control">
      </div>
      <div class="form-group">
        <label id="lblPassword" for="passwordInp">Password</label>
        <input type="password" id="passwordInp" class="form-control">
      </div>
      <button id="authSubmitBtn" class="btn" style="width: 100%;">Login</button>
      
      <div class="google-btn-wrapper">
        <div id="g_id_onload"
             data-client_id="866299105374-u85gqp68mvs4v7qfllor96v34c4v5nba.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleGoogleAuth"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signin_with"
             data-size="large"
             data-logo_alignment="left">
        </div>
      </div>

      <div id="authToggleMsg" class="auth-toggle">
        Don't have an account? <span id="authToggleBtn">Register here</span>
      </div>
    </div>

    <div id="namePromptView" class="card auth-view hidden">
      <h2 id="npTitle">Complete Your Profile</h2>
      <p id="npDesc" style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 16px;"></p>
      <div class="form-group">
        <label id="npLabel" for="fullNameInp">Full Name</label>
        <input type="text" id="fullNameInp" class="form-control">
      </div>
      <button id="npSubmitBtn" class="btn" style="width: 100%;">Finish and Enter</button>
    </div>

    <div id="mainView" class="grid hidden">
      <div>
        <div class="card">
          <h2 id="secSeminarsTitle">Upcoming Seminars</h2>
          <div id="seminarsList"></div>
        </div>

        <div class="card">
          <h2 id="secStreamTitle">Live Seminar Stream</h2>
          <div class="player-box">
            <div id="actionIcon" class="player-icon">▶</div>
            <div id="displayStatus" class="player-status">Streaming Paused (Idle)</div>
            <div class="progress-bar">
              <div id="fillBar" class="progress-fill"></div>
            </div>
          </div>
          <button id="actionBtn" class="btn">Start Playback</button>
        </div>
      </div>

      <div>
        <div class="card">
          <h2 id="secChatTitle">Global Chat Room</h2>
          <div class="chat-container">
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input-box">
              <textarea id="chatInput" placeholder="Type a message..."></textarea>
              <button id="chatSendBtn" class="btn">Send</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      let currentLang = localStorage.getItem('lang') || 'en';
      let isLoginMode = true;
      let googleIdToken = null;
      let videoActive = false;
      let videoInterval = null;
      let activeProgress = 0;
      let chatPollInterval = null;

      const localData = {
        en: {
          title: "Gamma Math Club",
          login: "Login",
          register: "Register",
          username: "Username",
          password: "Password",
          hasAccount: "Already have an account? ",
          noAccount: "Don't have an account? ",
          toRegister: "Register here",
          toLogin: "Login here",
          logout: "Logout",
          seminarsTitle: "Upcoming Seminars",
          streamTitle: "Live Seminar Stream",
          chatTitle: "Global Chat Room",
          rsvpBtn: "RSVP",
          rsvpedBtn: "✓ RSVPed",
          sendBtn: "Send",
          chatPlaceholder: "Type a message...",
          googleSignIn: "Sign in with Google",
          namePromptTitle: "Complete Your Profile",
          namePromptDesc: "Please enter your real full name to finalize your registration.",
          namePromptLabel: "Full Name",
          namePromptBtn: "Finish and Enter",
          ui: {
            startPlayback: "Start Playback",
            pauseSession: "Pause Session",
            streamingActive: "Live Streaming Active",
            streamingPaused: "Streaming Paused (Idle)"
          }
        },
        zh: {
          title: "伽马数学社",
          login: "登录",
          register: "注册",
          username: "用户名",
          password: "密码",
          hasAccount: "已有账号？",
          noAccount: "还没有账号？",
          toRegister: "立即注册",
          toLogin: "立即登录",
          logout: "退出登录",
          seminarsTitle: "近期学术讲座",
          streamTitle: "讲座在线直播",
          chatTitle: "公屏互动聊天室",
          rsvpBtn: "预约讲座",
          rsvpedBtn: "✓ 已预约",
          sendBtn: "发送",
          chatPlaceholder: "说点什么吧...",
          googleSignIn: "使用 Google 账号登录",
          namePromptTitle: "完善个人资料",
          namePromptDesc: "请输入您的真实姓名以完成注册流程。",
          namePromptLabel: "真实姓名",
          namePromptBtn: "完成并进入",
          ui: {
            startPlayback: "开始播放",
            pauseSession: "暂停会话",
            streamingActive: "直播流媒体传输中",
            streamingPaused: "直播已暂停 (空闲)"
          }
        }
      };

      const seminars = [
        { id: 1, enTitle: "An Introduction to Modern Algebraic Geometry", zhTitle: "现代代数几何导论", enTime: "Every Tuesday 14:00 - 16:00", zhTime: "每周二 14:00 - 16:00" },
        { id: 2, enTitle: "Category Theory and Functional Programming Foundations", zhTitle: "范畴论与函数式编程基础", enTime: "Every Thursday 10:00 - 12:00", zhTime: "每周四 10:00 - 12:00" },
        { id: 3, enTitle: "Stochastic Processes & High-Frequency Financial Modeling", zhTitle: "随机过程与高频金融建模", enTime: "Every Friday 15:30 - 17:30", zhTime: "每周五 15:30 - 17:30" }
      ];

      // Cache DOM Elements
      const langSelect = document.getElementById('langSelect');
      const authView = document.getElementById('authView');
      const mainView = document.getElementById('mainView');
      const namePromptView = document.getElementById('namePromptView');
      const userProfile = document.getElementById('userProfile');
      const userInfo = document.getElementById('userInfo');
      const logoutBtn = document.getElementById('logoutBtn');
      
      const authTitle = document.getElementById('authTitle');
      const lblUsername = document.getElementById('lblUsername');
      const usernameInp = document.getElementById('usernameInp');
      const lblPassword = document.getElementById('lblPassword');
      const passwordInp = document.getElementById('passwordInp');
      const authSubmitBtn = document.getElementById('authSubmitBtn');
      const authToggleMsg = document.getElementById('authToggleMsg');

      const npTitle = document.getElementById('npTitle');
      const npDesc = document.getElementById('npDesc');
      const npLabel = document.getElementById('npLabel');
      const fullNameInp = document.getElementById('fullNameInp');
      const npSubmitBtn = document.getElementById('npSubmitBtn');

      const secSeminarsTitle = document.getElementById('secSeminarsTitle');
      const secStreamTitle = document.getElementById('secStreamTitle');
      const secChatTitle = document.getElementById('secChatTitle');
      const chatMessages = document.getElementById('chatMessages');
      const chatInput = document.getElementById('chatInput');
      const chatSendBtn = document.getElementById('chatSendBtn');

      const actionIcon = document.getElementById('actionIcon');
      const displayStatus = document.getElementById('displayStatus');
      const fillBar = document.getElementById('fillBar');
      const actionBtn = document.getElementById('actionBtn');
      const logoEl = document.querySelector('.logo');
      const themeToggleBtn = document.getElementById('themeToggle');

      function applyLanguage() {
        const data = localData[currentLang];
        if (logoEl) logoEl.textContent = data.title;
        if (authTitle) authTitle.textContent = isLoginMode ? data.login : data.register;
        if (lblUsername) lblUsername.textContent = data.username;
        if (lblPassword) lblPassword.textContent = data.password;
        if (authSubmitBtn) authSubmitBtn.textContent = isLoginMode ? data.login : data.register;
        
        if (authToggleMsg) {
          if (isLoginMode) {
            authToggleMsg.innerHTML = data.noAccount + `<span id="authToggleBtn">${data.toRegister}</span>`;
          } else {
            authToggleMsg.innerHTML = data.hasAccount + `<span id="authToggleBtn">${data.toLogin}</span>`;
          }
          document.getElementById('authToggleBtn')?.addEventListener('click', toggleAuthMode);
        }

        if (npTitle) npTitle.textContent = data.namePromptTitle;
        if (npDesc) npDesc.textContent = data.namePromptDesc;
        if (npLabel) npLabel.textContent = data.namePromptLabel;
        if (npSubmitBtn) npSubmitBtn.textContent = data.namePromptBtn;

        if (secSeminarsTitle) secSeminarsTitle.textContent = data.seminarsTitle;
        if (secStreamTitle) secStreamTitle.textContent = data.streamTitle;
        if (secChatTitle) secChatTitle.textContent = data.chatTitle;
        if (chatInput) chatInput.placeholder = data.chatPlaceholder;
        if (chatSendBtn) chatSendBtn.textContent = data.sendBtn;
        if (logoutBtn) logoutBtn.textContent = data.logout;

        const playerTitle = document.getElementById('secStreamTitle');
        if (!videoActive) {
          if (actionBtn) actionBtn.textContent = data.ui.startPlayback;
          if (displayStatus) displayStatus.textContent = data.ui.streamingPaused;
        } else {
          if (actionBtn) actionBtn.textContent = data.ui.pauseSession;
          if (displayStatus) displayStatus.textContent = data.ui.streamingActive;
        }
      }

      function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        applyLanguage();
      }

      langSelect?.addEventListener('change', (e) => {
        currentLang = e.target.value;
        localStorage.setItem('lang', currentLang);
        applyLanguage();
        if (localStorage.getItem('token')) {
          syncRSVPs();
        }
      });

      if (langSelect) langSelect.value = currentLang;

      authSubmitBtn?.addEventListener('click', async () => {
        const username = usernameInp.value.trim();
        const password = passwordInp.value;
        if (!username || !password) return alert('Please fill fields');

        const endpoint = isLoginMode ? '/api/login' : '/api/register';
        try {
          const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const data = await res.json();
          if (!res.ok) return alert(data.error || 'Auth failed');

          if (isLoginMode) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('username', data.username);
            checkAuth();
          } else {
            alert(currentLang === 'en' ? 'Registration success! Please login.' : '注册成功！请登录。');
            isLoginMode = true;
            applyLanguage();
          }
        } catch (err) {
          alert(err.message);
        }
      });

      window.handleGoogleAuth = async function(response) {
        googleIdToken = response.credential;
        try {
          const res = await fetch('/api/google-auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id_token: googleIdToken })
          });
          const data = await res.json();
          if (!res.ok) return alert(data.error || 'Google auth error');

          if (data.requireName) {
            authView.classList.add('hidden');
            namePromptView.classList.remove('hidden');
          } else {
            localStorage.setItem('token', data.token);
            localStorage.setItem('username', data.username);
            checkAuth();
          }
        } catch (err) {
          alert(err.message);
        }
      };

      npSubmitBtn?.addEventListener('click', async () => {
        const name = fullNameInp.value.trim();
        if (!name) return alert('Name required');

        try {
          const res = await fetch('/api/google-auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id_token: googleIdToken, fullName: name })
          });
          const data = await res.json();
          if (!res.ok) return alert(data.error || 'Profile update failed');

          localStorage.setItem('token', data.token);
          localStorage.setItem('username', data.username);
          namePromptView.classList.add('hidden');
          checkAuth();
        } catch (err) {
          alert(err.message);
        }
      });

      logoutBtn?.addEventListener('click', () => {
        localStorage.removeItem('token');
        localStorage.removeItem('username');
        if (videoInterval) clearInterval(videoInterval);
        if (chatPollInterval) clearInterval(chatPollInterval);
        videoActive = false;
        activeProgress = 0;
        if (fillBar) fillBar.style.width = '0%';
        checkAuth();
      });

      async function syncRSVPs() {
        const token = localStorage.getItem('token');
        if (!token) return;
        try {
          const res = await fetch('/api/rsvp', {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          if (res.status === 401) {
            logoutBtn.click();
            return;
          }
          const data = await res.json();
          renderSeminars(data.rsvps || []);
        } catch {}
      }

      window.toggleRSVP = async function(seminarId) {
        const token = localStorage.getItem('token');
        if (!token) return;
        try {
          const res = await fetch('/api/rsvp', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ seminarId })
          });
          if (res.ok) syncRSVPs();
        } catch {}
      };

      function renderSeminars(rsvpedList = []) {
        const listContainer = document.getElementById('seminarsList');
        if (!listContainer) return;

        listContainer.innerHTML = '';
        seminars.forEach(s => {
          const isRsvped = rsvpedList.includes(s.id);
          const title = currentLang === 'en' ? s.enTitle : s.zhTitle;
          const time = currentLang === 'en' ? s.enTime : s.zhTime;
          
          const item = document.createElement('div');
          item.className = 'seminar-item';
          item.innerHTML = `
            <div class="seminar-info">
              <h3>${title}</h3>
              <p>${time}</p>
            </div>
            <button class="btn ${isRsvped ? 'outline' : ''}" onclick="toggleRSVP(${s.id})">
              ${isRsvped ? localData[currentLang].rsvpedBtn : localData[currentLang].rsvpBtn}
            </button>
          `;
          listContainer.appendChild(item);
        });
      }

      async function fetchChatMessages() {
        const token = localStorage.getItem('token');
        if (!token) return;
        try {
          const res = await fetch('/api/chat', {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          if (!res.ok) return;
          const messages = await res.json();
          
          if (chatMessages) {
            const isAtBottom = chatMessages.scrollHeight - chatMessages.clientHeight <= chatMessages.scrollTop + 40;
            chatMessages.innerHTML = '';
            messages.forEach(msg => {
              const div = document.createElement('div');
              div.className = 'chat-msg';
              const timeStr = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
              div.innerHTML = `<span class="user">${msg.username}:</span><span>${msg.message}</span><span class="time">${timeStr}</span>`;
              chatMessages.appendChild(div);
            });
            if (isAtBottom) {
              chatMessages.scrollTop = chatMessages.scrollHeight;
            }
          }
        } catch {}
      }

      async function sendChatMessage() {
        const text = chatInput.value.trim();
        if (!text) return;
        const token = localStorage.getItem('token');
        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ message: text })
          });
          if (res.ok) {
            chatInput.value = '';
            fetchChatMessages();
          }
        } catch {}
      }

      chatSendBtn?.addEventListener('click', sendChatMessage);
      chatInput?.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendChatMessage();
        }
      });

      function managePlayback() {
        const data = localData[currentLang];
        const playerTitle = document.getElementById('secStreamTitle');
        if (!videoActive) {
          videoActive = true;
          if (actionBtn) {
            actionBtn.textContent = data.ui.pauseSession;
            actionBtn.className = "btn secondary";
          }
          if (actionIcon) actionIcon.textContent = "⏸";
          if (playerTitle) playerTitle.style.color = "var(--accent-blue)";
          if (displayStatus) displayStatus.textContent = data.ui.streamingActive;
          videoInterval = setInterval(() => {
            if (activeProgress >= 100) activeProgress = 0;
            activeProgress += 0.4;
            if (fillBar) fillBar.style.width = activeProgress + "%";
          }, 100);
        } else {
          videoActive = false;
          if (actionBtn) {
            actionBtn.textContent = data.ui.startPlayback;
            actionBtn.className = "btn";
          }
          if (actionIcon) actionIcon.textContent = "▶";
          if (playerTitle) playerTitle.style.color = "";
          if (displayStatus) displayStatus.textContent = data.ui.streamingPaused;
          clearInterval(videoInterval);
        }
      }

      actionBtn?.addEventListener('click', managePlayback);
      actionIcon?.addEventListener('click', managePlayback);

      function initializeUI() {
        applyLanguage();
        syncRSVPs();
        fetchChatMessages();
        if (chatPollInterval) clearInterval(chatPollInterval);
        chatPollInterval = setInterval(fetchChatMessages, 2500);
      }

      function checkAuth() {
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        if (token && username) {
          if (userInfo) userInfo.textContent = username;
          userProfile?.classList.remove('hidden');
          mainView?.classList.remove('hidden');
          authView?.classList.add('hidden');
          namePromptView?.classList.add('hidden');
          initializeUI();
        } else {
          userProfile?.classList.add('hidden');
          mainView?.classList.add('hidden');
          namePromptView?.classList.add('hidden');
          authView?.classList.remove('hidden');
          applyLanguage();
        }
      }

      function updateThemeBtnIcon(theme) {
        if (theme === 'dark') {
          themeToggleBtn.textContent = '☀️';
        } else {
          themeToggleBtn.textContent = '🌙';
        }
      }

      window.addEventListener('DOMContentLoaded', () => {
        applyLanguage();
        checkAuth();
        
        // Setup initial button appearance based on document active layout state
        const activeTheme = document.documentElement.getAttribute('data-theme') || 'light';
        updateThemeBtnIcon(activeTheme);

        // Client-side theme switching logic
        themeToggleBtn?.addEventListener('click', () => {
          const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
          const newTheme = currentTheme === 'light' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', newTheme);
          localStorage.setItem('theme', newTheme);
          updateThemeBtnIcon(newTheme);
        });
      });

    })();
  </script>
</body>
</html>
