<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathClub - 极速算术挑战</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff; /* 浅蓝色背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .game-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
            max-width: 90%;
        }
        h1 { color: #2c3e50; margin-top: 0;}
        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #34495e;
            font-weight: bold;
        }
        .question {
            font-size: 3em;
            font-weight: bold;
            margin: 20px 0;
            color: #2980b9;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        button {
            padding: 15px;
            font-size: 1.5em;
            border: none;
            border-radius: 10px;
            background-color: #ecf0f1;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        button:hover { background-color: #bdc3c7; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        button.correct { background-color: #2ecc71 !important; color: white; }
        button.wrong { background-color: #e74c3c !important; color: white; }
        #start-btn {
            background-color: #3498db;
            color: white;
            width: 100%;
            margin-top: 20px;
            font-size: 1.3em;
            padding: 15px;
        }
        #start-btn:hover { background-color: #2980b9; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🔢 MathClub 挑战</h1>
    <div class="stats">
        <div>得分: <span id="score" style="color:#e67e22;">0</span></div>
        <div>时间: <span id="time" style="color:#e74c3c;">30</span>s</div>
    </div>
    
    <!-- 游戏区域 -->
    <div id="game-area" class="hidden">
        <div class="question" id="question">3 + 5 = ?</div>
        <div class="options" id="options">
            <!-- 选项按钮会由 JavaScript 动态生成 -->
        </div>
    </div>

    <!-- 开始/结束界面 -->
    <div id="start-screen">
        <p style="color: #7f8c8d; font-size: 1.1em;">在 <strong>30秒</strong> 内尽可能多地答对算术题！</p>
        <button id="start-btn" onclick="startGame()">开始游戏</button>
    </div>
</div>

<script>
    let score = 0;
    let timeLeft = 30;
    let timer;
    let correctAnswer;

    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');
    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const gameArea = document.getElementById('game-area');
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');

    function startGame() {
        score = 0;
        timeLeft = 30;
        scoreEl.innerText = score;
        timeEl.innerText = timeLeft;
        
        startScreen.classList.add('hidden');
        gameArea.classList.remove('hidden');
        
        nextQuestion();
        
        timer = setInterval(() => {
            timeLeft--;
            timeEl.innerText = timeLeft;
            if (timeLeft <= 0) {
                endGame();
            }
        }, 1000);
    }

    function nextQuestion() {
        const ops = ['+', '-', '×'];
        const op = ops[Math.floor(Math.random() * ops.length)];
        let num1, num2;

        // 生成题目逻辑
        if (op === '+') {
            num1 = Math.floor(Math.random() * 50) + 1;
            num2 = Math.floor(Math.random() * 50) + 1;
            correctAnswer = num1 + num2;
        } else if (op === '-') {
            num1 = Math.floor(Math.random() * 50) + 20; // 保证被减数较大
            num2 = Math.floor(Math.random() * 20) + 1;
            correctAnswer = num1 - num2;
        } else {
            num1 = Math.floor(Math.random() * 12) + 2; // 乘法控制在12以内
            num2 = Math.floor(Math.random() * 12) + 2;
            correctAnswer = num1 * num2;
        }

        questionEl.innerText = `${num1} ${op} ${num2} = ?`;

        // 混淆选项生成逻辑
        let answers = [correctAnswer];
        while (answers.length < 4) {
            let offset = Math.floor(Math.random() * 21) - 10; // 偏差在 -10 到 +10 之间
            let wrong = correctAnswer + offset;
            // 确保错误答案不等于正确答案，不重复，且不为负数
            if (wrong !== correctAnswer && !answers.includes(wrong) && wrong >= 0) {
                answers.push(wrong);
            }
        }

        // 打乱四个选项的顺序
        answers.sort(() => Math.random() - 0.5);

        // 渲染按钮
        optionsEl.innerHTML = '';
        answers.forEach(ans => {
            const btn = document.createElement('button');
            btn.innerText = ans;
            btn.onclick = () => checkAnswer(btn, ans);
            optionsEl.appendChild(btn);
        });
    }

    function checkAnswer(btn, ans) {
        // 玩家点击后，立刻禁用所有按钮，防止乱点
        Array.from(optionsEl.children).forEach(b => b.disabled = true);
        
        if (ans === correctAnswer) {
            btn.classList.add('correct');
            score += 10;
            scoreEl.innerText = score;
        } else {
            btn.classList.add('wrong');
            // 如果答错，自动标出正确的按钮是哪一个
            Array.from(optionsEl.children).forEach(b => {
                if (parseInt(b.innerText) === correctAnswer) {
                    b.classList.add('correct');
                }
            });
        }

        // 停顿 0.4 秒后自动进入下一题，让玩家看清楚对错
        setTimeout(() => {
            if (timeLeft > 0) nextQuestion();
        }, 400);
    }

    function endGame() {
        clearInterval(timer);
        gameArea.classList.add('hidden');
        startScreen.classList.remove('hidden');
        startScreen.innerHTML = `
            <h2 style="color:#e74c3c;">时间到！</h2>
            <p style="font-size:1.2em;">你的最终得分: <strong style="font-size:1.5em;color:#27ae60;">${score}</strong></p>
        `;
        startBtn.innerText = "再玩一次";
        startScreen.appendChild(startBtn);
    }
</script>
</body>
</html>
